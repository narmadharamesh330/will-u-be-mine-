<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine? ❤️</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff6b81,#ff9a9e);
overflow-x:hidden;
text-align:center;
color:white;
}

/* Floating Hearts */

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-20px;
font-size:22px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

.container{
padding:30px 15px;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:42px;
margin-top:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

.message{
font-size:20px;
margin:20px auto;
max-width:700px;
line-height:1.8;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
border:4px solid white;
transition:.5s;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.gallery img:hover{
transform:scale(1.08);
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff2d55;
cursor:pointer;
margin:30px 10px;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#result{
font-size:35px;
margin:30px;
font-weight:bold;
display:none;
animation:fadeIn 2s;
}

.footer{
padding:20px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>Hey ❤️</h1>

<div class="message">

Every moment with you feels special... 🌸<br><br>

You make me smile without even trying.<br>
You are the reason my heart beats a little faster.<br><br>

I've been waiting for the right moment to tell you... 💖

</div>

<div class="gallery">

<!-- Replace these with your photos -->

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

<h2>Will You Be My Forever? ❤️</h2>

<button onclick="yesClicked()">YES 💍</button>

<div id="result">
❤️ I Promise To Make You Smile Every Day ❤️
</div>

<div class="footer">
Made with ❤️ just for you
</div>

</div>

<!-- Optional Background Music -->
<!--
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
-->

<script>

// Floating hearts

const hearts=document.getElementById("hearts");

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";

hearts.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

},300);


// Proposal Button

function yesClicked(){

document.getElementById("result").style.display="block";

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{
confetti({
particleCount:200,
spread:120
});
},500);

setTimeout(()=>{
confetti({
particleCount:200,
spread:360
});
},1000);

}

</script>

</body>
</html>
